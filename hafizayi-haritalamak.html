<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapping Memory — Hafızayı Haritalamak — Bîranîna Nexşekirî</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #252525;
      --text: #e2e2e2;
      --text-muted: #666;
      --accent: #c8a96e;
      --accent2: #7ab3cc;
      --red: #c86e6e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    /* ── HEADER ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .tabs { display: flex; gap: 2px; }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-family: inherit;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tab-btn:hover { color: var(--text); border-color: var(--border); }
    .tab-btn.active { color: var(--accent); border-color: var(--accent); }
    .lang-switch {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .lang-btn {
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 10px;
      font-family: inherit;
      padding: 5px 9px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .lang-btn:last-child { border-right: none; }
    .lang-btn:hover { background: var(--surface2); color: var(--text); }
    .lang-btn.active { background: var(--surface2); color: var(--accent); }
    /* ── MAIN ── */
    .main { padding-top: 52px; height: 100vh; }
    /* ── MAPS ── */
    .maps-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 52px);
    }
    .map-section {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .map-section:last-child { border-right: none; }
    .map-label {
      position: absolute;
      top: 14px; left: 14px;
      z-index: 500;
      background: rgba(10,10,10,0.88);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      pointer-events: none;
    }
    .map-legend {
      position: absolute;
      bottom: 28px; left: 14px;
      z-index: 500;
      background: rgba(10,10,10,0.88);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 3px;
      pointer-events: none;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    .legend-person {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--accent2);
      flex-shrink: 0;
    }
    /* ── NARRATIVE PANEL ── */
    .narrative-overlay {
      position: fixed;
      top: 52px; bottom: 0; right: 0;
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 800;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .narrative-overlay.open { transform: translateX(0); }
    .narrative-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .narrative-type {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .narrative-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }
    .narrative-date {
      font-size: 11px;
      color: var(--accent);
      margin-top: 3px;
    }
    .close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 26px; height: 26px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .close-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .narrative-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
    }
    .narrative-text {
      font-size: 13.5px;
      line-height: 1.85;
      color: #bbb;
    }
    .narrative-quote {
      border-left: 2px solid var(--accent);
      padding: 0 0 0 14px;
      margin: 16px 0;
      font-style: italic;
      color: #999;
      font-size: 13px;
      line-height: 1.7;
    }
    .narrative-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }
    .listen-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      padding: 8px;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .listen-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .listen-btn.playing { color: var(--accent); border-color: var(--accent); background: rgba(200,169,110,0.05); }
    /* ── CUSTOM MARKERS ── */
    .m-event {
      width: 10px; height: 10px;
      background: var(--red);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(200,110,110,0.2);
      transition: transform 0.15s;
    }
    .m-event:hover { transform: scale(1.6); }
    .m-event.active {
      transform: scale(1.4);
      box-shadow: 0 0 0 6px rgba(200,110,110,0.15);
    }
    .m-person {
      width: 12px; height: 12px;
      background: #d4d4d4;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(212,212,212,0.18);
      transition: transform 0.15s;
    }
    .m-person:hover { transform: scale(1.6); }
    .m-person.active {
      transform: scale(1.4);
      box-shadow: 0 0 0 6px rgba(212,212,212,0.12);
    }
    /* ── LEAFLET OVERRIDES ── */
    .leaflet-control-attribution {
      background: rgba(10,10,10,0.75) !important;
      color: #444 !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #555 !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text-muted) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--surface2) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      color: var(--text) !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      color: var(--text) !important;
      margin: 10px 14px !important;
    }
    .dark-tooltip {
      background: rgba(10,10,10,0.9) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      font-size: 11px !important;
      font-family: 'Inter', sans-serif !important;
      padding: 4px 8px !important;
      border-radius: 3px !important;
      box-shadow: none !important;
    }
    .dark-tooltip::before { display: none !important; }
    /* ── ABOUT ── */
    .about-container {
      height: calc(100vh - 52px);
      overflow-y: auto;
      max-width: 680px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    .about-section { margin-bottom: 44px; }
    .about-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .about-title {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 20px;
    }
    .about-section p {
      font-size: 14px;
      line-height: 1.85;
      color: #999;
      margin-bottom: 14px;
    }
    .about-divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .ref-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
    }
    .ref-card h4 { font-size: 12px; font-weight: 600; margin-bottom: 5px; }
    .ref-card p { font-size: 11px; color: var(--text-muted); margin: 0; line-height: 1.6; }
    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @keyframes pulse-red {
      0%   { box-shadow: 0 0 0 0 rgba(200,110,110,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(200,110,110,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,110,110,0); }
    }
    @keyframes pulse-white {
      0%   { box-shadow: 0 0 0 0 rgba(212,212,212,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(212,212,212,0); }
      100% { box-shadow: 0 0 0 0 rgba(212,212,212,0); }
    }
    .m-event.pulsing  { animation: pulse-red   2s infinite; }
    .m-person.pulsing { animation: pulse-white 2.4s infinite; }
    @media (max-width: 768px) {
      .maps-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .narrative-overlay { width: 100%; }
    }
  </style>
</head>
<body>

// ─── MAP COMPONENT ────────────────────────────────────
function LeafletMap({ city, markers, lang, onMarkerClick, activeId }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markerLayerRef = useRef({});

  const center = city === 'belfast' ? [54.5973, -5.9301] : [37.9155, 40.2199];
  const zoom   = city === 'belfast' ? 14 : 15;

  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    const map = L.map(containerRef.current, { center, zoom, zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);
    mapRef.current = map;
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, []);

  useEffect(() => {
    if (!mapRef.current) return;
    Object.values(markerLayerRef.current).forEach(m => m.remove());
    markerLayerRef.current = {};

    markers.forEach(mk => {
      const d = mk[lang] || mk.en;
      const isEvent  = mk.type === 'event';
      const isActive = mk.id === activeId;
      const html = isEvent
        ? `<div class="m-event pulsing${isActive?' active':''}"></div>`
        : `<div class="m-person pulsing${isActive?' active':''}"></div>`;

      const icon = L.divIcon({
        html,
        className: '',
        iconSize:   isEvent ? [10,10] : [12,12],
        iconAnchor: isEvent ? [5,5]   : [6,6],
      });

      const lm = L.marker([mk.lat, mk.lng], { icon }).addTo(mapRef.current);
      lm.bindTooltip(d.name, { permanent:false, direction:'top', className:'dark-tooltip', offset:[0,-6] });
      lm.on('click', () => {
        onMarkerClick(mk);
        mapRef.current.flyTo([mk.lat, mk.lng], 17, { animate:true, duration:1.4 });
      });
      markerLayerRef.current[mk.id] = lm;
    });
  }, [markers, lang, activeId, onMarkerClick]);

  return <div ref={containerRef} style={{width:'100%',height:'100%'}} />;
}

// ─── NARRATIVE PANEL ──────────────────────────────────
function NarrativePanel({ marker, lang, t, onClose }) {
  const [playing, setPlaying] = useState(false);
  const d = marker ? (marker[lang] || marker.en) : null;

  useEffect(() => {
    return () => window.speechSynthesis?.cancel();
  }, []);

  useEffect(() => {
    if (!marker) { window.speechSynthesis?.cancel(); setPlaying(false); }
  }, [marker]);

  const handleListen = () => {
    if (!d) return;
    if (playing) { window.speechSynthesis?.cancel(); setPlaying(false); return; }
    const text = `${d.name}. ${d.date}. ${d.text}. ${d.quote}`;
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = lang === 'tr' ? 'tr-TR' : lang === 'ku' ? 'tr-TR' : 'en-GB';
    u.rate  = 0.88;
    u.onend = u.onerror = () => setPlaying(false);
    window.speechSynthesis.speak(u);
    setPlaying(true);
  };

  return (
    <div className={`narrative-overlay${marker ? ' open' : ''}`}>
      {marker && d && <>
        <div className="narrative-header">
          <div>
            <div className="narrative-type">{t[`type_${marker.type}`]}</div>
            <div className="narrative-name">{d.name}</div>
            <div className="narrative-date">{d.date}</div>
          </div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="narrative-body">
          <p className="narrative-text">{d.text}</p>
          {d.quote && <blockquote className="narrative-quote">"{d.quote}"</blockquote>}
        </div>
        <div className="narrative-footer">
          <button className={`listen-btn${playing ? ' playing' : ''}`} onClick={handleListen}>
            <span>{playing ? '⏹' : '▶'}</span>
            {playing ? t.stop : t.listen}
          </button>
        </div>
      </>}
    </div>
  );
}
